<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Topshirish - O'quvchi Paneli</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; }
        .container { max-width: 700px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #444; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #1557b0; }
        #testArea { margin-top: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
        .q-box { background: #f9f9f9; padding: 10px; border-radius: 6px; border: 1px solid #eee; text-align: center; }
        .result-box { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; text-align: center; }
        .success { background: #e6ffed; border: 1px solid #34a853; color: #2d8e47; }
        .subject-badge { background: #e1f5fe; color: #01579b; padding: 4px 10px; border-radius: 4px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>✍️ Test Topshirish</h2>
    <hr>

    <div id="setupSection">
        <div class="form-group">
            <label>Ism-familiyangiz:</label>
            <input type="text" id="studentName" placeholder="Masalan: Ali Valiyev">
        </div>

        <div class="form-group">
            <label>Fanni tanlang:</label>
            <select id="subjectName">
                <option value="">-- Fanni tanlang --</option>
                <option value="Huquq">Huquq</option>
                <option value="Chet tili">Chet tili</option>
                <option value="Matematika">Matematika</option>
                <option value="Fizika">Fizika</option>
                <option value="Kimyo">Kimyo</option>
                <option value="Biologiya">Biologiya</option>
                <option value="Tarix">Tarix</option>
                <option value="IQ">IQ</option>
                <option value="DTM standart">DTM standart</option>
            </select>
        </div>

        <div class="form-group">
            <label>Test kodi (O'qituvchi bergan):</label>
            <input type="number" id="testCode" placeholder="Masalan: 77">
        </div>

        <div class="form-group">
            <label>Baholash turi:</label>
            <select id="gradeType">
                <option value="umumiy">Umumiy (Hamma savol 1 ball)</option>
                <option value="mahsus">Mahsus (1.1, 2.1, 3.1 ballik tizim)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Savollar soni:</label>
            <input type="number" id="qCount" placeholder="Nechta savol yechasiz?" min="1" max="90">
        </div>

        <button onclick="generateSheet()">Katakchalarni ochish</button>
    </div>

    <div id="testArea"></div>

    <button id="submitBtn" style="display:none; margin-top: 20px; background: #34a853;" onclick="sendResults()">Testni yakunlash</button>

    <div id="resultDisplay" class="result-box success">
        <h3>Natija: <span id="finalScore">0</span> ball</h3>
        <p id="resultSubjectInfo"></p>
        <p id="wrongInfo"></p>
        <button onclick="location.reload()" style="background: #5f6368; width: auto;">Qayta topshirish</button>
    </div>
</div>

<script>
    function generateSheet() {
        const count = document.getElementById('qCount').value;
        const subject = document.getElementById('subjectName').value;
        const area = document.getElementById('testArea');
        
        if (!subject) return alert("Iltimos, avval fanni tanlang!");
        if (!count || count < 1) return alert("Savollar sonini kiriting!");

        area.innerHTML = '';
        for (let i = 1; i <= count; i++) {
            area.innerHTML += `
                <div class="q-box">
                    <small>${i}-savol</small><br>
                    <select class="ans-input" id="q_${i}">
                        <option value="">-</option>
                        <option value="A">A</option>
                        <option value="B">B</option>
                        <option value="C">C</option>
                        <option value="D">D</option>
                    </select>
                </div>
            `;
        }
        document.getElementById('submitBtn').style.display = 'block';
        document.getElementById('setupSection').style.opacity = '0.5';
        document.getElementById('setupSection').style.pointerEvents = 'none'; // Malumotlarni o'zgartira olmasligi uchun
    }

    async function sendResults() {
        const name = document.getElementById('studentName').value;
        const subject = document.getElementById('subjectName').value;
        const testCode = document.getElementById('testCode
