<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O'qituvchi Boshqaruvi</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2, h3 { color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .section { margin-bottom: 30px; padding: 15px; border: 1px solid #eef; border-radius: 8px; }
        input, select, button { padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 6px; }
        button { cursor: pointer; background-color: #34a853; color: white; border: none; transition: 0.3s; }
        button:hover { background-color: #2d8e47; }
        .limit-info { background: #e8f5e9; padding: 10px; border-radius: 6px; color: #2e7d32; font-weight: bold; }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f1f3f4; }
        .wrong-tag { background: #fee; color: #c00; padding: 2px 6px; border-radius: 4px; font-size: 12px; margin-right: 4px; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginBox">
        <h2>O'qituvchi Kirish</h2>
        <input type="password" id="tCodeInput" placeholder="Maxsus kodni kiriting">
        <button onclick="login()">Kirish</button>
    </div>

    <div id="mainPanel" class="hidden">
        <div class="limit-info">
            Salom, <span id="teacherNameDisplay">...</span>! 
            Sizning qolgan limitingiz: <span id="limitDisplay">0</span> ta test.
        </div>

        <div class="section">
            <h3>➕ Yangi Test Qo'shish</h3>
            <label>Fan tanlang:</label>
            <select id="subject">
                <option value="Huquq">Huquq</option>
                <option value="Chet tili">Chet tili</option>
                <option value="IQ">IQ</option>
                <option value="Fizika">Fizika</option>
                <option value="Matematika">Matematika</option>
                <option value="Kimyo">Kimyo</option>
                <option value="Biologiya">Biologiya</option>
                <option value="Tarix">Tarix</option>
                <option value="Umumiy">Umumiy</option>
            </select><br>

            <input type="number" id="testCode" placeholder="Test kodi (masalan: 11)">
            <input type="number" id="qCount" placeholder="Savollar soni (10-90)" min="10" max="90">
            <button onclick="buildAnswerFields()">Javoblarni kiritish</button>

            <div id="answerInputs" class="hidden" style="margin-top:15px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;">
                </div>
            <button id="saveBtn" class="hidden" onclick="saveTest()" style="margin-top:20px; width:100%; background:#1a73e8;">Testni bazaga saqlash</button>
        </div>

        <div class="section">
            <h3>📊 Natijalar va Monitoring</h3>
            <input type="number" id="searchTestCode" placeholder="Test kodini yozing">
            <button onclick="getResults()">Natijalarni ko'rish</button>

            <table>
                <thead>
                    <tr>
                        <th>O'quvchi</th>
                        <th>Ball</th>
                        <th>Xato qilingan savollar (Monitoring)</th>
                    </tr>
                </thead>
                <tbody id="resultBody">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let currentTCode = "";

    async function login() {
        const code = document.getElementById('tCodeInput').value;
        const res = await fetch('/api/teacher/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ code })
        });
        const data = await res.json();
        
        if (data.success) {
            currentTCode = code;
            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById('mainPanel').classList.remove('hidden');
            document.getElementById('teacherNameDisplay').innerText = data.teacher.name;
            document.getElementById('limitDisplay').innerText = data.teacher.testLimit - data.teacher.usedLimit;
        } else {
            alert(data.message);
        }
    }

    function buildAnswerFields() {
        const count = document.getElementById('qCount').value;
        const area = document.getElementById('answerInputs');
        area.innerHTML = '';
        if (count < 10 || count > 90) return alert("10 tadan 90 tagacha kiriting");

        for (let i = 1; i <= count; i++) {
            area.innerHTML += `
                <div>
                    <small>${i}-savol:</small><br>
                    <select id="q_${i}">
                        <option value="A">A</option><option value="B">B</option>
                        <option value="C">C</option><option value="D">D</option>
                    </select>
                </div>
            `;
        }
        area.classList.remove('hidden');
        document.getElementById('saveBtn').classList.remove('hidden');
    }

    async function saveTest() {
        const answers = [];
        const count = document.getElementById('qCount').value;
        for (let i = 1; i <= count; i++) {
            answers.push(document.getElementById(`q_${i}`).value);
        }

        const payload = {
            tCode: currentTCode,
            subject: document.getElementById('subject').value,
            testCode: document.getElementById('testCode').value,
            answers: answers
        };

        const res = await fetch('/api/teacher/add-test', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        alert(data.message);
        if(data.success) location.reload();
    }

    async function getResults() {
        const code = document.getElementById('searchTestCode').value;
        const res = await fetch(`/api/teacher/results/${code}`);
        const data = await res.json();
        
        const body = document.getElementById('resultBody');
        body.innerHTML = '';

        if (data.length === 0) {
            body.innerHTML = '<tr><td colspan="3">Hozircha natijalar yo'q yoki test topilmadi.</td></tr>';
            return;
        }

        data.forEach(r => {
            let wrongs = r.wrongDetails.map(num => `<span class="wrong-tag">${num}</span>`).join('');
            body.innerHTML += `
                <tr>
                    <td>${r.studentName}</td>
                    <td><b>${r.score}</b></td>
                    <td>${wrongs || 'Xatosiz ✅'}</td>
                </tr>
            `;
        });
    }
</script>

</body>
</html>
